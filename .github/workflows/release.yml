name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    name: Build, attest, and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify release assets exist
        run: |
          missing=0
          for asset in manifest.json main.js styles.css; do
            if [ ! -f "$asset" ]; then
              echo "::error::Missing required release asset: $asset"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Verify manifest version matches pushed tag
        run: |
          tag="${GITHUB_REF_NAME}"
          manifest_version=$(node -p "require('./manifest.json').version")
          if [ "$tag" != "$manifest_version" ]; then
            echo "::error::Pushed tag '$tag' does not match manifest.json version '$manifest_version'"
            exit 1
          fi
          echo "Tag '$tag' matches manifest version '$manifest_version'"

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            manifest.json
            main.js
            styles.css

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            manifest.json
            main.js
            styles.css
